<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Adwaita Sans</family>
            <family>Noto Sans Serif</family>
        </prefer>
    </alias>
    <alias>
        <family>serif</family>
        <prefer>
            <family>Noto Serif</family>
        </prefer>
    </alias>
    <alias>
        <family>monospace</family>
        <prefer>
            <family>AdwaitaMono Nerd Font</family>
            <family>Noto Sans Mono</family>
        </prefer>
    </alias>

    <!-- Disable ligatures for monospace fonts-->
    <match target="font">
        <test name="family" compare="contains" ignore-blanks="true">
            <string>Mono</string>
        </test>
        <edit name="fontfeatures" mode="append">
            <string>liga off</string>
            <string>dlig off</string>
            <string>clig off</string>
            <string>calt off</string>
        </edit>
    </match>
</fontconfig>
